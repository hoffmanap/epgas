<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Paso Regular Gas Price Trends</title>
    <!-- Include Tailwind CSS for sleek layout styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Include Chart.js for building dynamic interactive trend lines -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">El Paso Regular Gas Tracker</h1>
            <p class="text-slate-500 mt-2">Daily historical trends averaged across spatial grid collection nodes (zeros excluded).</p>
        </header>

        <!-- Main Dashboard Card Area -->
        <main class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <div id="loading" class="flex flex-col items-center justify-center py-20 text-slate-400">
                <svg class="animate-spin h-8 w-8 text-blue-500 mb-3" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-sm font-medium">Parsing spatial fuel dataset matrix...</p>
            </div>

            <!-- Chart Container (hidden until data loads) -->
            <div id="chart-container" class="hidden relative h-[450px] w-full">
                <canvas id="trendsChart"></canvas>
            </div>
        </main>
    </div>

    <script>
        // Bulletproof parsing block designed to dynamically handle split-row text mismatches safely
        function parseCSV(text) {
            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            if (lines.length === 0) return [];

            // Standardize target headers
            const headers = ["Station_ID", "Name", "Address", "Latitude", "Longitude", "Regular_Price", "Plus_Price", "Premium_Price", "Scrape_Date"];
            
            return lines.slice(1).map(line => {
                const values = line.split(',');
                const obj = {};
                
                // If the CSV row matches expected comma layout lengths
                if (values.length >= headers.length) {
                    headers.forEach((header, i) => {
                        obj[header] = values[i] ? values[i].trim() : null;
                    });
                } else {
                    // Fallback strategy: If a row has merged data fields, look for the date stamp at the tail 
                    // and look for standard decimal structures matching a local fuel price
                    const dateMatch = line.match(/\d{4}-\d{2}-\d{2}/);
                    const priceMatches = line.match(/\b\d\.\d{2}\b/g);
                    
                    obj["Scrape_Date"] = dateMatch ? dateMatch[0] : null;
                    obj["Regular_Price"] = priceMatches ? priceMatches[0] : "0.0";
                }
                return obj;
            });
        }

        async function initDashboard() {
            try {
                // Fetch the dynamic spatial CSV generated by your scraper
                const response = await fetch('el_paso_gas_prices.csv');
                if (!response.ok) throw new Error('Data file mapping read error.');
                const csvText = await response.text();
                
                const rawData = parseCSV(csvText);
                const dateGroups = {};

                rawData.forEach(row => {
                    const date = row.Scrape_Date;
                    if (!date) return;

                    if (!dateGroups[date]) {
                        dateGroups[date] = { sum: 0, count: 0 };
                    }

                    const price = parseFloat(row.Regular_Price);

                    // Core Rule: Ignore exactly 0.0, negative entries, or unpopulated null fields
                    if (!isNaN(price) && price > 0) { 
                        dateGroups[date].sum += price; 
                        dateGroups[date].count++; 
                    }
                });

                // Generate sorted array labels for the chart timeline axis
                const sortedDates = Object.keys(dateGroups).sort();
                const avgRegular = [];

                sortedDates.forEach(date => {
                    const group = dateGroups[date];
                    avgRegular.push(group.count > 0 ? (group.sum / group.count).toFixed(2) : null);
                });

                // Switch container elements visibility
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('chart-container').classList.remove('hidden');

                // Render single-metric ChartJS visualization dashboard
                const ctx = document.getElementById('trendsChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: sortedDates,
                        datasets: [
                            {
                                label: 'Regular Unleaded (Averaged)',
                                data: avgRegular,
                                borderColor: '#2563eb', // Clean Royal Blue 
                                backgroundColor: 'rgba(37, 99, 235, 0.05)',
                                fill: true,
                                borderWidth: 3.5,
                                tension: 0.15,
                                pointBackgroundColor: '#2563eb',
                                pointRadius: 4,
                                spanGaps: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top', labels: { font: { weight: 'bold', size: 13 } } },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return `${context.dataset.label}: $${context.raw}/Gal`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                ticks: { callback: value => '$' + value },
                                title: { display: true, text: 'Fuel Cost ($ USD)', font: { weight: 'bold' } }
                            },
                            x: {
                                title: { display: true, text: 'Collection Snapshot Timeline', font: { weight: 'bold' } }
                            }
                        }
                    }
                });

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = `
                    <p class="text-rose-500 font-medium">⚠️ Dashboard Integration Challenge</p>
                    <p class="text-slate-400 text-xs mt-1">Verify that el_paso_gas_prices.csv exists cleanly in the root of your GitHub repository repository.</p>
                `;
            }
        }

        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
