<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Paso Regular Gas Price Trends</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">El Paso Regular Gas Tracker</h1>
            <p class="text-slate-500 mt-2">Daily historical trends averaged across spatial grid collection nodes (zeros excluded).</p>
        </header>

        <main class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <div id="loading" class="flex flex-col items-center justify-center py-20 text-slate-400">
                <svg class="animate-spin h-8 w-8 text-blue-500 mb-3" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-sm font-medium">Parsing spatial fuel dataset matrix...</p>
            </div>

            <div id="chart-container" class="hidden relative h-[450px] w-full">
                <canvas id="trendsChart"></canvas>
            </div>
        </main>
    </div>

    <script>
        // Highly resilient parser using explicit column indexes to locate regular prices and dates
        function parseHeaderMappedCSV(text) {
            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            if (lines.length <= 1) return [];

            // 1. Map headers to dynamic layout index mappings
            const headers = lines[0].split(',').map(h => h.trim());
            const regPriceIdx = headers.indexOf("Regular_Price");
            const dateIdx = headers.indexOf("Scrape_Date");

            const records = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                
                // Smart split strategy that honors quoted fields like "El Paso, TX 79925" without splitting on internal commas
                const matches = line.match(/(".*?"|[^,]+|(?=\s*,)|(?=\s*$))/g);
                if (!matches) continue;

                // Pad matches to protect index references if trailing fields are raw empty lines
                while (matches.length < headers.length) {
                    matches.push("");
                }

                const rowValues = matches.map(val => val.replace(/^"|"$/g, '').trim());

                const rawPrice = rowValues[regPriceIdx];
                const rawDate = rowValues[dateIdx];

                if (rawDate) {
                    const cleanPrice = parseFloat(rawPrice);
                    records.push({
                        Scrape_Date: rawDate,
                        Regular_Price: !isNaN(cleanPrice) ? cleanPrice : 0.0
                    });
                }
            }
            return records;
        }

        async function initDashboard() {
            try {
                const response = await fetch('el_paso_gas_prices.csv');
                if (!response.ok) throw new Error('Data file mapping read error.');
                const csvText = await response.text();
                
                const rawData = parseHeaderMappedCSV(csvText);
                const dateGroups = {};

                rawData.forEach(row => {
                    const date = row.Scrape_Date;
                    const price = row.Regular_Price;

                    // Filter out non-numeric values, exact zeros, and high placeholders
                    if (price > 2.00 && price < 7.00) { 
                        if (!dateGroups[date]) {
                            dateGroups[date] = { sum: 0, count: 0 };
                        }
                        dateGroups[date].sum += price; 
                        dateGroups[date].count++; 
                    }
                });

                // Sort structural calendar timestamps chronologically
                const sortedDates = Object.keys(dateGroups).sort((a, b) => new Date(a) - new Date(b));
                const avgRegular = [];

                sortedDates.forEach(date => {
                    const group = dateGroups[date];
                    avgRegular.push(group.count > 0 ? (group.sum / group.count).toFixed(2) : null);
                });

                if (sortedDates.length === 0) {
                    throw new Error("No valid regular gas entries found matching historical criteria.");
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('chart-container').classList.remove('hidden');

                const ctx = document.getElementById('trendsChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: sortedDates,
                        datasets: [
                            {
                                label: 'Regular Unleaded Average ($/Gal)',
                                data: avgRegular,
                                borderColor: '#2563eb', 
                                backgroundColor: 'rgba(37, 99, 235, 0.05)',
                                fill: true,
                                borderWidth: 3.5,
                                tension: 0.15,
                                pointBackgroundColor: '#2563eb',
                                pointRadius: 5,
                                spanGaps: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top', labels: { font: { weight: 'bold', size: 13 } } },
                            tooltip: {
                                callbacks: {
                                    label: context => `Average Price: $${context.raw}`
                                }
                            }
                        },
                        scales: {
                            y: {
                                ticks: { callback: value => '$' + value },
                                title: { display: true, text: 'Fuel Cost ($ USD)', font: { weight: 'bold' } }
                            },
                            x: {
                                title: { display: true, text: 'Collection Timeline Date', font: { weight: 'bold' } }
                            }
                        }
                    }
                });

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = `
                    <p class="text-rose-500 font-medium">⚠️ Data Stream Visualization Disruption</p>
                    <p class="text-slate-400 text-xs mt-1">${error.message}</p>
                `;
            }
        }

        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
